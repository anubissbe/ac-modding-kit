name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff and mypy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - name: Install project and development dependencies
        run: python -m pip install --upgrade --editable ".[dev]"

      - name: Check formatting
        run: python -m ruff format --check src schemas skills/ancient-cities-modding/scripts tests examples tools/blender

      - name: Lint
        run: python -m ruff check src schemas skills/ancient-cities-modding/scripts tests examples tools/blender

      - name: Type-check public SDK
        run: python -m mypy --strict src/acmk

      - name: Verify package version is the SDK version source of truth
        run: python -c "import tomllib, acmk; expected=tomllib.load(open('pyproject.toml','rb'))['project']['version']; assert acmk.__version__ == expected"

  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and test dependencies
        run: python -m pip install --upgrade --editable ".[test]"

      - name: Compile Python sources
        run: python -m compileall -q src schemas skills/ancient-cities-modding/scripts tests examples tools/blender

      - name: Run tests
        run: python -m pytest

  package:
    name: Validate package
    needs:
      - lint
      - test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Build and inspect distributions
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Install and exercise wheel
        run: |
          python -m pip install --force-reinstall dist/*.whl
          python -I -c "import acmk; import acmk.knowledge_data; import acmk.schemas; import ancient_cities_mod"
          python -I -c "from importlib.resources import files; assert files('acmk').joinpath('py.typed').is_file()"
          python -I -c "from importlib.resources import files; assert len(tuple(files('acmk.knowledge_data').glob('*.md'))) == 5"
          python -I -c "from importlib.resources import files; assert {path.name for path in files('acmk.schemas').glob('*.json')} == {'acmk-project-v1.schema.json', 'acmk-report-envelope-v1.schema.json', 'acmk-runtime-test-v1.schema.json', 'acmk-runtime-test-v2.schema.json'}"
          python -I -c "from acmk import BuildingSpec, BuildingScaffoldBuilder; assert BuildingSpec and BuildingScaffoldBuilder"
          python -I -m acmk --help
          acmk --help
          acmk self-test
